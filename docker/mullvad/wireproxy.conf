# Import the operator-supplied Mullvad WireGuard profile as a secret.
# This keeps real Mullvad credentials out of git while letting the sidecar stay declarative.
WGConfig = /run/secrets/mullvad-wg.conf

[Socks5]
# Internal-only proxy. Keep it un-published on the host and consume it from the app container.
BindAddress = 0.0.0.0:1080
