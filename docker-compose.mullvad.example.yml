services:
  phantom3-v2:
    depends_on:
      - mullvad-socks5
    environment:
      PHANTOM3_V2_POLYMARKET_PROXY_URL: ${PHANTOM3_V2_POLYMARKET_PROXY_URL:-socks5h://mullvad-socks5:1080}
      PHANTOM3_V2_POLYMARKET_OPERATOR_ELIGIBILITY: ${PHANTOM3_V2_POLYMARKET_OPERATOR_ELIGIBILITY:-unknown}

  mullvad-socks5:
    image: ghcr.io/windtf/wireproxy:3792cd42b2ffb9653fb4beb3fe9c66d1512f9ce0
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    expose:
      - "1080"
    command:
      - -c
      - /etc/wireproxy/wireproxy.conf
    volumes:
      - type: bind
        source: ./docker/mullvad/wireproxy.conf
        target: /etc/wireproxy/wireproxy.conf
        read_only: true
    secrets:
      - source: mullvad_wg_config
        target: mullvad-wg.conf

secrets:
  mullvad_wg_config:
    file: ${PHANTOM3_V2_MULLVAD_WIREGUARD_HOST_PATH:-./runtime/mullvad/wireguard.conf}
