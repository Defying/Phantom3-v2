# Copy this volume item into the container-only Mullvad proxy or WireGuard service.
# The host file is prepared by ./scripts/prepare-mullvad-wireguard-config.sh and stays gitignored.
x-phantom3-v2-mullvad-wireguard-mount: &phantom3-v2-mullvad-wireguard-mount
  type: bind
  source: ${PHANTOM3_V2_MULLVAD_WIREGUARD_HOST_PATH:-./runtime/mullvad/wireguard.conf}
  target: ${PHANTOM3_V2_MULLVAD_WIREGUARD_CONTAINER_PATH:-/run/mullvad/wireguard.conf}
  read_only: true

# Example usage:
# services:
#   mullvad-proxy:
#     volumes:
#       - *phantom3-v2-mullvad-wireguard-mount
