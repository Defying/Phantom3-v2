services:
  wraith:
    image: node:25-bookworm
    working_dir: /app
    init: true
    restart: unless-stopped
    ports:
      - "4317:4317"
    env_file:
      - ${WRAITH_ENV_FILE:-./.env}
    environment:
      WRAITH_HOST: 0.0.0.0
      WRAITH_PORT: 4317
      WRAITH_DATA_DIR: /runtime/data
      WRAITH_LOG_DIR: /runtime/logs
    volumes:
      - ./:/app
      - wraith_node_modules:/app/node_modules
      - wraith_runtime_data:/runtime/data
      - wraith_runtime_logs:/runtime/logs
    command:
      - /bin/sh
      - -lc
      - |
        if [ ! -d node_modules ] || [ -z "$(ls -A node_modules 2>/dev/null)" ]; then
          npm ci
        fi
        if [ ! -f apps/web/dist/index.html ]; then
          npm run build:web
        fi
        npm run check
        npm run verify:paper-safe
        exec npm run start
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:4317/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

volumes:
  wraith_node_modules:
  wraith_runtime_data:
  wraith_runtime_logs:
