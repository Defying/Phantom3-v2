services:
  phantom3-v2:
    image: node:25-bookworm
    working_dir: /app
    init: true
    restart: unless-stopped
    depends_on:
      - mullvad-socks5
    ports:
      - "4317:4317"
    env_file:
      - ${PHANTOM3_V2_ENV_FILE:-./.env.example}
    environment:
      PHANTOM3_V2_HOST: 0.0.0.0
      PHANTOM3_V2_PORT: 4317
      PHANTOM3_V2_DATA_DIR: /runtime/data
      PHANTOM3_V2_LOG_DIR: /runtime/logs
      PHANTOM3_V2_POLYMARKET_PROXY_URL: ${PHANTOM3_V2_POLYMARKET_PROXY_URL:-socks5h://mullvad-socks5:1080}
      PHANTOM3_V2_POLYMARKET_OPERATOR_ELIGIBILITY: ${PHANTOM3_V2_POLYMARKET_OPERATOR_ELIGIBILITY:-unknown}
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./:/app
      - phantom3_v2_node_modules:/app/node_modules
      - phantom3_v2_runtime_data:/runtime/data
      - phantom3_v2_runtime_logs:/runtime/logs
    command:
      - /bin/sh
      - -lc
      - |
        if [ ! -d node_modules ] || [ -z "$(ls -A node_modules 2>/dev/null)" ]; then
          npm ci
        fi
        if [ ! -f apps/web/dist/index.html ]; then
          npm run build:web
        fi
        npm run check
        npm run verify:paper-safe
        exec npm run start
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:4317/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  mullvad-socks5:
    image: ghcr.io/windtf/wireproxy:3792cd42b2ffb9653fb4beb3fe9c66d1512f9ce0
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    expose:
      - "1080"
    command:
      - -c
      - /etc/wireproxy/wireproxy.conf
    volumes:
      - type: bind
        source: ./docker/mullvad/wireproxy.conf
        target: /etc/wireproxy/wireproxy.conf
        read_only: true
    secrets:
      - source: mullvad_wg_config
        target: mullvad-wg.conf

secrets:
  mullvad_wg_config:
    file: ${PHANTOM3_V2_MULLVAD_WIREGUARD_HOST_PATH:-./runtime/mullvad/wireguard.conf}

volumes:
  phantom3_v2_node_modules:
  phantom3_v2_runtime_data:
  phantom3_v2_runtime_logs:
